service: deskflow

image: ahmed-alsheiba/deskflow

servers:
  web:
    - 192.168.8.223

proxy:
  ssl: false
  host: deskflow.dev
  forward_headers: true

registry:
  server: ghcr.io
  username: ahmed-alsheiba
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_ASSUME_SSL: true
    DB_HOST: shared-postgres
    DB_PORT: 5432
    POSTGRES_USER: helpdesk

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

volumes:
  - "deskflow_storage:/rails/storage"

asset_path: /rails/public/assets

ssh:
  user: deploy

builder:
  arch: arm64

accessories:
  cloudflared:
    image: cloudflare/cloudflared:latest
    host: 192.168.8.223
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN

  # Postgres is no longer an accessory of this app. The shared Postgres container
  # (shared-postgres) is owned by the separate `shared-infra` Kamal project and is
  # reached over the kamal network via DB_HOST: shared-postgres (see env above).
  # The `helpdesk` role + deskflow_production DB live inside that shared cluster.