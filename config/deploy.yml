service: mini_helpdesk

image: ahmed-alsheiba/mini_helpdesk

servers:
  web:
    - 192.168.8.223

proxy:
  ssl: false
  host: deskflow.dev
  forward_headers: true

registry:
  server: ghcr.io
  username: ahmed-alsheiba
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_ASSUME_SSL: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

volumes:
  - "mini_helpdesk_storage:/rails/storage"

asset_path: /rails/public/assets

ssh:
  user: deploy

builder:
  arch: arm64

accessories:
  cloudflared:
    image: cloudflare/cloudflared:latest
    host: 192.168.8.223
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - CLOUDFLARE_TUNNEL_TOKEN

  db:
    image: postgres:17
    host: 192.168.8.223
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: mini_helpdesk
        POSTGRES_DB: mini_helpdesk_production
    volumes:
      - mini_helpdesk_db:/var/lib/postgresql/data