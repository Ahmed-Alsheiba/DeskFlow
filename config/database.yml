default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: mini_helpdesk_development

test:
  <<: *default
  database: mini_helpdesk_test

production:
  primary: &primary_production
    <<: *default
    host: <%= ENV["DB_HOST"] %>
    port: <%= ENV["DB_PORT"] %>
    username: <%= ENV["POSTGRES_USER"] %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    database: helpdesk_production
  cache:
    <<: *primary_production
    database: helpdesk_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: helpdesk_production_queue
    migrations_paths: db/queue_migrate